name: Build Emerald PT-BR HGSS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/build-rom.yml"
      - "README.md"
  pull_request:
    branches: [main]
    paths:
      - "scripts/**"
      - ".github/workflows/build-rom.yml"
      - "README.md"
      - "BUILD_TRIGGER.md"

permissions:
  contents: read

concurrency:
  group: emerald-ptbr-hgss-build-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout integration scripts
        uses: actions/checkout@v4

      - name: Install build and translation dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libpng-dev \
            python3-pil \
            git
          python3 -m pip install --upgrade pip
          python3 -m pip install \
            torch \
            transformers==4.49.0 \
            sentencepiece \
            sacremoses

      - name: Checkout pinned PT-BR source
        run: |
          git clone --filter=blob:none https://github.com/lucmsilva651/esmeralda-ptbr.git game
          git -C game checkout 16899178c5d9b198b961c3e38389ccccbdff7836

      - name: Checkout only HGSS Pokémon sprite assets
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/PokeAPI/sprites.git pokeapi-sprites
          git -C pokeapi-sprites sparse-checkout set sprites/pokemon/versions/generation-iv/heartgold-soulsilver
          test -f pokeapi-sprites/sprites/pokemon/versions/generation-iv/heartgold-soulsilver/1.png
          test -f pokeapi-sprites/sprites/pokemon/versions/generation-iv/heartgold-soulsilver/back/shiny/386.png

      - name: Checkout converted human overworld assets
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/TeamAquasHideout/Team-Aquas-Asset-Repo.git team-aqua-assets
          git -C team-aqua-assets sparse-checkout set "Overworld Trainer Sprites/RavePossum/Poffin-Case-Overworlds-Converted"
          test -f "team-aqua-assets/Overworld Trainer Sprites/RavePossum/Poffin-Case-Overworlds-Converted/brendan/walking.png"
          test -f "team-aqua-assets/Overworld Trainer Sprites/RavePossum/Poffin-Case-Overworlds-Converted/youngster.png"

      - name: Apply HGSS visual overhaul v1.3
        run: |
          python3 scripts/apply_overhaul.py \
            --project game \
            --sprites-root pokeapi-sprites/sprites/pokemon/versions/generation-iv/heartgold-soulsilver \
            --overworlds-root "team-aqua-assets/Overworld Trainer Sprites/RavePossum/Poffin-Case-Overworlds-Converted"

      - name: Normalize untranslated English text to PT-BR
        id: translation
        continue-on-error: true
        run: |
          set -o pipefail
          python3 scripts/translate_ptbr.py \
            --project game \
            --report translation_consistency_v1.3.json \
            2>&1 | tee translation_v1.3.log

      - name: Upload translation diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: translation-diagnostics-v1.3
          path: |
            translation_v1.3.log
            translation_consistency_v1.3.json
          if-no-files-found: warn
          retention-days: 7

      - name: Stop after translation failure
        if: steps.translation.outcome != 'success'
        run: exit 1

      - name: Build and install agbcc
        run: |
          git clone --depth 1 https://github.com/pret/agbcc.git agbcc
          cd agbcc
          ./build.sh
          ./install.sh ../game

      - name: Build ROM
        env:
          MODERN: "1"
          COMPARE: "0"
        run: |
          make -j"$(nproc)" all
        working-directory: game

      - name: Prepare artifact
        run: |
          test -f game/pokeemerald_modern.gba
          cp game/pokeemerald_modern.gba Emerald_PTBR_HGSS_v1.3.gba
          sha256sum Emerald_PTBR_HGSS_v1.3.gba | tee SHA256SUMS.txt
          cp game/overworld_import_v1.3.json .
          ls -lh Emerald_PTBR_HGSS_v1.3.gba

      - name: Upload playable build
        uses: actions/upload-artifact@v4
        with:
          name: Emerald-PTBR-HGSS-v1.3
          path: |
            Emerald_PTBR_HGSS_v1.3.gba
            SHA256SUMS.txt
            overworld_import_v1.3.json
            translation_consistency_v1.3.json
          if-no-files-found: error
          retention-days: 30
