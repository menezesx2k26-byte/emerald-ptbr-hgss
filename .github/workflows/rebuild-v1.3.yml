name: Rebuild Emerald PT-BR HGSS v1.3

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - ".github/workflows/rebuild-v1.3.yml"
      - "scripts/sanitize_translated_text.py"
      - "scripts/sanitize_charmap_text.py"

permissions:
  contents: read
  actions: read

jobs:
  rebuild:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout integration scripts
        uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            gcc-arm-none-eabi \
            binutils-arm-none-eabi \
            libpng-dev \
            python3-pil \
            git

      - name: Checkout pinned PT-BR source
        run: |
          git clone --filter=blob:none https://github.com/lucmsilva651/esmeralda-ptbr.git game
          git -C game checkout 16899178c5d9b198b961c3e38389ccccbdff7836

      - name: Download completed translation shards
        uses: actions/download-artifact@v4
        with:
          pattern: translation-shard-*
          path: translation-output
          merge-multiple: true
          run-id: 29142865485
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply PT-BR translation patches
        run: |
          for patch in translation-output/translation-shard-*.patch; do
            echo "Applying ${patch}"
            git -C game apply --whitespace=nowarn "$GITHUB_WORKSPACE/$patch"
          done

      - name: Sanitize translated text
        run: |
          python3 scripts/sanitize_translated_text.py \
            --project game \
            --report translation_sanitizer_v1.3.json

      - name: Audit translated text against charmap
        run: |
          python3 scripts/sanitize_charmap_text.py \
            --project game \
            --report charmap_sanitizer_v1.3.json

      - name: Checkout only HGSS Pokémon sprite assets
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/PokeAPI/sprites.git pokeapi-sprites
          git -C pokeapi-sprites sparse-checkout set sprites/pokemon/versions/generation-iv/heartgold-soulsilver

      - name: Checkout converted human overworld assets
        run: |
          git clone --depth 1 --filter=blob:none --sparse https://github.com/TeamAquasHideout/Team-Aquas-Asset-Repo.git team-aqua-assets
          git -C team-aqua-assets sparse-checkout set "Overworld Trainer Sprites/RavePossum/Poffin-Case-Overworlds-Converted"

      - name: Apply HGSS visual overhaul v1.3
        run: |
          python3 scripts/apply_overhaul.py \
            --project game \
            --sprites-root pokeapi-sprites/sprites/pokemon/versions/generation-iv/heartgold-soulsilver \
            --overworlds-root "team-aqua-assets/Overworld Trainer Sprites/RavePossum/Poffin-Case-Overworlds-Converted"

      - name: Build and install agbcc
        run: |
          git clone --depth 1 https://github.com/pret/agbcc.git agbcc
          cd agbcc
          ./build.sh
          ./install.sh ../game

      - name: Build ROM with full diagnostics
        id: buildrom
        continue-on-error: true
        run: |
          set -o pipefail
          make -j"$(nproc)" all 2>&1 | tee "$GITHUB_WORKSPACE/build-v1.3.log"
        working-directory: game
        env:
          MODERN: "1"
          COMPARE: "0"

      - name: Upload build diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-diagnostics-v1.3
          path: |
            build-v1.3.log
            translation_sanitizer_v1.3.json
            charmap_sanitizer_v1.3.json
          if-no-files-found: error
          retention-days: 7

      - name: Stop on build failure
        if: steps.buildrom.outcome != 'success'
        run: exit 1

      - name: Prepare artifact
        run: |
          test -f game/pokeemerald_modern.gba
          cp game/pokeemerald_modern.gba Emerald_PTBR_HGSS_v1.3.gba
          sha256sum Emerald_PTBR_HGSS_v1.3.gba | tee SHA256SUMS.txt
          cp game/overworld_import_v1.3.json .
          python3 - <<'PY'
          import glob, json
          from pathlib import Path
          reports=[json.loads(Path(p).read_text(encoding='utf-8')) for p in sorted(glob.glob('translation-output/translation-shard-*.json'))]
          summary={
            'version':'1.3',
            'shards':len(reports),
            'text_segments_translated':sum(r['text_segments_translated'] for r in reports),
            'files_changed':sum(r['files_changed'] for r in reports),
            'assembly_blocks_translated':sum(r['assembly_blocks_translated'] for r in reports),
            'c_strings_translated':sum(r['c_strings_translated'] for r in reports),
            'move_names_policy':'English move names and descriptions preserved',
            'excluded_move_files':['src/data/text/move_names.h','src/data/text/move_descriptions.h'],
          }
          Path('translation_consistency_v1.3.json').write_text(json.dumps(summary,indent=2,ensure_ascii=False)+'\n',encoding='utf-8')
          PY

      - name: Upload playable ROM
        uses: actions/upload-artifact@v4
        with:
          name: Emerald-PTBR-HGSS-v1.3
          path: |
            Emerald_PTBR_HGSS_v1.3.gba
            SHA256SUMS.txt
            overworld_import_v1.3.json
            translation_consistency_v1.3.json
            translation_sanitizer_v1.3.json
            charmap_sanitizer_v1.3.json
          if-no-files-found: error
          retention-days: 30
